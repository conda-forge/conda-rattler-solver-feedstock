context:
  version: "0.1.0"

package:
  name: conda-rattler-solver
  version: ${{ version }}

source:
  url: https://github.com/conda/conda-rattler-solver/archive/${{ version }}.tar.gz
  sha256: b14a5b952bd96542c68883b6ab890a43b53890785580e730d9fc55d26c53e8d6

build:
  noarch: python
  script: SETUPTOOLS_SCM_PRETEND_VERSION="${{ version }}" python -m pip install . -vv
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }}
    - conda >=26.5.0
    - py-rattler >=0.23.0,<0.24.0a0

tests:
  - python:
      imports:
        - conda_rattler_solver.solver
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - python -m conda create --dry-run --solver=rattler --channel=conda-forge python

about:
  homepage: https://github.com/conda/conda-rattler-solver
  summary: 'The fast pixi solver, now in conda'
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jaimergp
