context:
  name: conda-rattler-solver
  version: "0.0.4"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/conda-incubator/conda-rattler-solver/archive/${{ version }}.tar.gz
  sha256: a5679d389459d040017d7ce301edb678c562cdec5014f828f6bb803afa109b0f

build:
  noarch: python
  script: SETUPTOOLS_SCM_PRETEND_VERSION="${{ version }}" python -m pip install . -vv
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }}
    - conda >=25.5.0
    - py-rattler >=0.20.0

tests:
  - python:
      imports:
        - conda_rattler_solver.solver
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - python -m conda create --dry-run --solver=rattler --channel=conda-forge python

about:
  homepage: https://github.com/conda-incubator/conda-rattler-solver
  summary: 'The fast pixi solver, now in conda'
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jaimergp
